name: Deploy and Run FUTOI

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists (in HOME)
        env:
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p ~/apps/moex-robot"

      - name: Rsync project to server (HOME path)
        env:
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            -e "ssh -p $SSH_PORT" \
            ./ "$SSH_USER@$SSH_HOST:~/apps/moex-robot/"

      - name: Run script on server
        env:
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd ~/apps/moex-robot
          # Проверим Python 3 в PATH
          if ! command -v python3 >/dev/null 2>&1; then
            echo "python3 not found in PATH. Please install Python 3 on the server."
            exit 1
          fi
          echo "Running scripts/get_futoi.py ..."
          python3 scripts/get_futoi.py | head -n 80
          EOF
